<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Certificado Suporte Básico de Vida (BLS)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #e8e8e8;
      font-family: system-ui, sans-serif;
      color: #222;
    }
    .bar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: #0f2744;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .bar span { font-size: 14px; }
    .bar a {
      color: #fff;
      text-decoration: none;
      background: #1e5a9c;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      white-space: nowrap;
    }
    .pages {
      max-width: 1000px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .pages img {
      width: 100%;
      height: auto;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,.15);
      display: block;
    }
  </style>
</head>
<body>
  <div class="bar">
    <span>Certificado Suporte Básico de Vida (BLS)</span>
    <a id="download" href="certificado.pdf" download="Certificado Suporte Básico de Vida (BLS).pdf">Baixar PDF</a>
  </div>
  <div class="pages">
    <img src="pagina1.png" alt="Certificado - frente">
    <img src="pagina2.png" alt="Certificado - verso">
  </div>
  <script>
    window.addEventListener("load", function () {
      setTimeout(function () {
        document.getElementById("download").click();
      }, 500);
    });
  </script>
</body>
</html>
