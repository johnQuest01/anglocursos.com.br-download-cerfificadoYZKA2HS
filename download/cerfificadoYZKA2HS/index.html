<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baixar Certificado</title>
</head>
<body>
  <p style="font-family: system-ui, sans-serif; padding: 24px;">
    Baixando o certificado…
    <a id="link" href="certificado.pdf" download="Certificado Suporte Básico de Vida (BLS).pdf">
      Clique aqui se o download não iniciar
    </a>
  </p>
  <script>
    const a = document.getElementById("link");
    a.click();
  </script>
</body>
</html>
