<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Certificado Suporte Básico de Vida (BLS)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #111; }
    .bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      background: #0f2744;
      color: #fff;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    .bar a {
      color: #fff;
      text-decoration: none;
      background: #1e5a9c;
      padding: 8px 14px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .viewer {
      width: 100%;
      height: calc(100% - 48px);
      border: 0;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="bar">
    <span>Certificado Suporte Básico de Vida (BLS)</span>
    <a id="download" href="certificado.pdf" download="Certificado Suporte Básico de Vida (BLS).pdf">Baixar PDF</a>
  </div>
  <embed class="viewer" src="certificado.pdf#toolbar=1&navpanes=0" type="application/pdf">
  <script>
    // Inicia o download ao abrir a página, mantendo o PDF visível
    window.addEventListener("load", function () {
      setTimeout(function () {
        document.getElementById("download").click();
      }, 400);
    });
  </script>
</body>
</html>
